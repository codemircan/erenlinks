<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Batch URL Opener</title>
  <style>
    body {
      width: 400px;
      font-family: Arial, sans-serif;
      padding: 15px;
      background-color: #f7f7f7;
    }
    textarea {
      width: 100%;
      height: 200px;
      margin-bottom: 15px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      resize: vertical;
    }
    .button-container {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }
    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.2s;
    }
    #open-btn {
      background-color: #4CAF50;
      color: white;
    }
    #open-btn:hover {
      background-color: #45a049;
    }
    #freeze-btn {
      background-color: #2196F3;
      color: white;
    }
    #freeze-btn:hover {
      background-color: #1e88e5;
    }
    #progress-status {
      margin-top: 15px;
      font-size: 14px;
      color: #555;
      text-align: center;
    }
  </style>
</head>
<body>
  <textarea id="url-list" placeholder="Enter URLs, one per line..."></textarea>
  <div class="button-container">
    <button id="open-btn">Open Tabs</button>
    <button id="freeze-btn">Freeze Tabs</button>
  </div>
  <div id="progress-status">Ready</div>
  <script src="popup.js"></script>
</body>
</html>
